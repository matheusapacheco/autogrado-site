name: Publicar site no Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp -qq
      - name: Testar caminho absoluto do webroot
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
        run: |
          printf 'REAL' > x.txt
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:timeout 15; echo '=PUT='; put x.txt -o /domains/autogrado.com.br/public_html/zzz-real.txt; echo '=LS WEBROOT='; ls /domains/autogrado.com.br/public_html/; bye" 2>&1 || true
