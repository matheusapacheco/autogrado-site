name: Publicar site no Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp -qq
      - name: Limpar entulho em /public_html (sem tocar no site real)
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
        run: |
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:timeout 20; echo '=ANTES /public_html='; ls -a /public_html/; echo '=LIMPANDO='; rm -rf /public_html/assets; rm -rf /public_html/domains; rm -rf /public_html/public_html; rm -f /public_html/index.html; rm -f /public_html/politica-de-privacidade.html; rm -f /public_html/termos-de-uso.html; rm -f /public_html/.htaccess; rm -f /public_html/.ftp-deploy-sync-state.json; rm -f /public_html/zzz-raiz.txt; rm -f /public_html/zzz-sd.txt; echo '=DEPOIS /public_html='; ls -a /public_html/; echo '=WEBROOT REAL (deve ter a landing)='; ls /domains/autogrado.com.br/public_html/ | head; bye" 2>&1 || true
