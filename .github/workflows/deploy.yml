name: Publicar site no Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Comparar IPv4 do FTP x do dominio
        env:
          H: ${{ secrets.FTP_HOST }}
        run: |
          DOM_V4=$(getent ahostsv4 autogrado.com.br | awk '{print $1}' | head -1)
          FTP_V4=$(getent ahostsv4 "$H" | awk '{print $1}' | head -1)
          [ -z "$FTP_V4" ] && FTP_V4="$H"
          echo "IPv4 do dominio: $DOM_V4"
          echo "IPv4 do FTP:     $FTP_V4"
          if [ "$DOM_V4" = "$FTP_V4" ]; then
            echo "RESULTADO: MESMO servidor"
          else
            echo "RESULTADO: DIFERENTES"
          fi
