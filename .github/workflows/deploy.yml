name: Publicar site no Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp -qq
      - name: Explorar acima do login
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
        run: |
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:timeout 15; echo '=PWD='; quote PWD; echo '=SOBE 1 (cd ..)='; cd ..; quote PWD; ls; echo '=SOBE 2 (cd ../..)='; cd ..; quote PWD; ls; bye" 2>&1 || true
