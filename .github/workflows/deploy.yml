name: Publicar site no Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp -qq

      - name: Sincronizar com o Hostinger (lftp mirror)
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
        run: |
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:max-retries 2; set net:timeout 20; mirror -R --delete --verbose --exclude-glob .git* --exclude .github/ --exclude-glob README.md --exclude-glob 'LEIA-ME*' --exclude-glob .gitignore --exclude-glob .ftp-deploy-sync-state.json ./ domains/autogrado.com.br/public_html/; bye"
