name: Publicar site no Hostinger

# Publica automaticamente no Hostinger a cada mudanca na branch main.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Enviar por FTP para o Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          server-dir: /domains/autogrado.com.br/public_html/
          local-dir: ./
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitignore
            LEIA-ME*.txt
