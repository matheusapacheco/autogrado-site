name: Publicar site no Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp -qq

      - name: Descobrir webroot
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
          SD: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          printf 'SDTEST' > x.txt
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:timeout 15; echo '=== onde o FTP cai (PWD) ==='; quote PWD; echo '=== secret SD conteudo ==='; ls \"$SD\" 2>&1 | head -20; echo '=== put marcador no SD ==='; put x.txt -o \"$SD/zzz-sd.txt\" 2>&1; echo '=== ls files/ ==='; ls files/ 2>&1 | head; echo '=== ls files/public_html/ ==='; ls files/public_html/ 2>&1 | head; bye" 2>&1 || true
