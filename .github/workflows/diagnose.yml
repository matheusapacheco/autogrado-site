name: Diag FTP
on: [push]
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Listar estrutura do FTP
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp -qq
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; echo '>>> PWD:'; pwd; echo '>>> LS(login):'; ls; echo '>>> FIND 2 niveis:'; find -d 2; bye" 2>&1 || true
