name: Diag FTP
on: [push]
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Listar estrutura do FTP
        env:
          H: ${{ secrets.FTP_HOST }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
          PT: ${{ secrets.FTP_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp -qq
          lftp -p "$PT" -u "$U","$P" "$H" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; echo '=== ARVORE (3 niveis) ==='; find -d 3 /; echo '=== ITENS COM wp ==='; find / | grep -i wp | head -20; bye" 2>&1 || true
